# Example configuration for Duffing oscillator with structural constraints
# This demonstrates encoding domain-specific knowledge into the SimpleLure model
#
# Duffing oscillator dynamics:
#   x1_dot = x2                    (velocity)
#   x2_dot = -delta*x2 - alpha*x1 - beta*x1^3 + gamma*u(t)
#   y = x1                         (observe position only)
#
# Structural constraints encode the physics:
#   - Only x2 (velocity) is affected by input and nonlinearity
#   - Output observes only x1 (position): C = [1, 0]
#   - No direct feedthrough: D = 0, D12 = 0

data:
  train_path: "data/duffing/train"
  input_col: ["u"]  # External forcing
  output_col: ["y"]  # Position measurement
  state_col: []  # No direct state observations
  pattern: "*.csv"
  normalize: true
  normalization_method: "minmax"
  batch_size: 32
  sequence_length: null
  shuffle: true
  num_workers: 0

model:
  model_type: "simple_lure"
  nd: 1  # Input dimension (forcing)
  ne: 1  # Output dimension (position)
  nx: 2  # State dimension (position + velocity)
  nw: 10  # Nonlinearity dimension (DZN activation)
  num_layers: 1
  activation: "dzn"  # Dead-zone nonlinearity for cubic term approximation
  dropout: 0.0
  
  # Structural constraints encoding Duffing oscillator physics
  custom_params:
    structural_constraints:
      # Input matrix B: only second row (velocity) is affected by input
      B:
        learnable_rows: [1]  # Only x2_dot depends on input
        fixed_value: 0.0     # x1_dot independent of input
      
      # Nonlinearity input matrix B2: only second row affected
      B2:
        learnable_rows: [1]  # Only x2_dot has nonlinear term
        fixed_value: 0.0     # x1_dot is linear
      
      # Output matrix C: observe position only
      C:
        fixed: true
        value: [[1.0, 0.0]]  # y = x1
      
      # Direct feedthrough D: none
      D:
        fixed: true
        value: 0.0
      
      # Nonlinearity feedthrough D12: none
      D12:
        fixed: true
        value: 0.0

  # Initialization: use ESN with constraints
  initialization:
    method: "esn"
    esn_n_restarts: 10  # More restarts for better random initialization

optimizer:
  optimizer_type: "adam"
  learning_rate: 1e-3
  weight_decay: 1e-5
  
  # Learning rate scheduler
  use_scheduler: true
  scheduler_type: "reduce_on_plateau"
  scheduler_patience: 15
  scheduler_factor: 0.5

training:
  max_epochs: 500
  early_stopping_patience: 50
  checkpoint_frequency: 10
  gradient_clip_value: 1.0
  
  loss_type: "mse"
  
  # Interior Point Method for LMI constraints (ensures stability)
  use_custom_regularization: true
  regularization_weight: 1.0
  decay_regularization_weight: true
  regularization_decay_factor: 0.5
  
  device: "cpu"
  log_interval: 10

mlflow:
  experiment_name: "duffing_oscillator_structured"
  run_name: null
  log_models: true
  log_artifacts: true

# Reproducibility
seed: 42
output_dir: "outputs/duffing"
model_dir: "models/duffing"
log_dir: "logs/duffing"

# Evaluation metrics
evaluation:
  metrics_to_log:
    - "mse"
    - "rmse"
    - "mae"
    - "r2"
