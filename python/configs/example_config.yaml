# Example configuration for training RNN models

# Data configuration - Three options:

# Option 1: Direct folder loading (RECOMMENDED)
data:
  train_path: "data/prepared"  # Folder with train/test/validation subfolders
  input_col: "d"               # Column name for input
  output_col: "e"              # Column name for output
  pattern: "*.csv"             # File pattern to match
  normalize: true
  normalization_method: "minmax"  # or "standard"
  batch_size: 32
  sequence_length: null        # null for full sequences
  shuffle: true
  num_workers: 0

# Option 2: Single CSV files (uncomment to use)
# data:
#   train_path: "data/train.csv"
#   val_path: "data/val.csv"
#   test_path: "data/test.csv"
#   normalize: true
#   normalization_method: "minmax"
#   batch_size: 32
#   sequence_length: 100
#   shuffle: true
#   num_workers: 4

# Model configuration
model:
  model_type: "lstm"  # "rnn", "lstm", "gru"
  input_size: 2
  hidden_size: 64
  output_size: 1
  num_layers: 2
  dropout: 0.1
  activation: "tanh"  # for SimpleRNN only
  custom_params: null

# Optimizer configuration
optimizer:
  optimizer_type: "adam"  # "adam", "sgd", "rmsprop", "adamw"
  learning_rate: 0.001
  weight_decay: 0.00001
  momentum: 0.9  # for SGD
  betas: [0.9, 0.999]  # for Adam
  
  # Learning rate scheduler
  use_scheduler: true
  scheduler_type: "reduce_on_plateau"  # "step", "exponential", "reduce_on_plateau", "cosine"
  scheduler_patience: 10
  scheduler_factor: 0.5

# Training configuration
training:
  max_epochs: 1000
  early_stopping_patience: 50
  checkpoint_frequency: 10
  gradient_clip_value: 1.0
  
  # Loss function
  loss_type: "mse"  # "mse", "mae", "huber"
  
  # Regularization
  use_custom_regularization: false
  regularization_weight: 0.01
  
  # Device
  device: "cuda"  # "cuda", "cpu", "mps"
  
  # Logging
  log_interval: 10
  use_tensorboard: true

# MLflow configuration
mlflow:
  tracking_uri: "http://localhost:5000"
  experiment_name: "sysid_training"
  run_name: null  # auto-generated if null
  log_models: true
  log_artifacts: true

# Paths
output_dir: "outputs"
model_dir: "models"
log_dir: "logs"

# Reproducibility
seed: 42
