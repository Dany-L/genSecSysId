# Example: Identity Initialization (simplest, fastest)
data:
  train_path: ~/genSecSysId-Data/data/Duffing/train
  input_col: ["d"]
  output_col: ["e"]
  state_col: []
  pattern: "*.csv"
  normalize: true
  batch_size: 32
  sequence_length: 500
  sequence_stride: 1

model:
  model_type: crnn
  nw: 64
  nx: 8
  activation: sat
  initialization:
    method: identity  # Simplest initialization: A=0.9I, C=[I,0], B2=D=D12=0

optimizer:
  optimizer_type: adam
  learning_rate: 0.001
  weight_decay: 1e-5
  use_scheduler: true
  scheduler_type: reduce_on_plateau
  scheduler_patience: 10
  scheduler_factor: 0.5

training:
  max_epochs: 500
  early_stopping_patience: 50
  gradient_clip_value: 1.0
  loss_type: mse
  use_custom_regularization: false

mlflow:
  experiment_name: sysid_identity_init
  run_name: identity_baseline
  log_models: true
  log_artifacts: true

evaluation:
  metrics: ["mse", "rmse", "mae", "r2"]
