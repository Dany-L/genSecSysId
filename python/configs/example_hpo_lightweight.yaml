# Example: Lightweight ESN for Hyperparameter Optimization
# Uses minimal restarts (1) for fast trials, scales up on best configuration

data:
  train_path: ~/genSecSysId-Data/data/Duffing/train
  input_col: ["d"]
  output_col: ["e"]
  state_col: []
  pattern: "*.csv"
  normalize: true
  batch_size: 32
  sequence_length: 500
  sequence_stride: 1

model:
  model_type: crnn
  nw: 64
  nx: 8
  activation: sat
  initialization:
    method: esn
    esn_n_restarts: 2  # Minimal restarts for fast trials
                       # Note: optimize_hyperparameters.py will use esn_n_restarts=1

optimizer:
  optimizer_type: adam
  learning_rate: 0.001
  weight_decay: 1e-5
  use_scheduler: true
  scheduler_type: reduce_on_plateau
  scheduler_patience: 5     # Shorter patience for trials
  scheduler_factor: 0.5

training:
  max_epochs: 100           # Fewer epochs for trials
  early_stopping_patience: 20
  gradient_clip_value: 1.0
  loss_type: mse
  use_custom_regularization: false

mlflow:
  experiment_name: sysid_hpo
  run_name: trial
  log_models: false         # Don't log models during trials
  log_artifacts: false

evaluation:
  metrics: ["mse", "rmse", "mae"]
